name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CloudStream Win ${{ github.ref_name }}"
          releaseBody: |
            ## CloudStream Win ${{ github.ref_name }}

            ### How to install
            1. Download `cloudstream-win_*_x64_en-US.msi` below
            2. Run the installer
            3. If Windows SmartScreen appears → click **More info → Run anyway**
            4. Go to the **Plugins** tab and install your first plugin

            ### Included plugins (put in the `plugins/` folder)
            | Plugin | Content | Notes |
            |--------|---------|-------|
            | `gogoanime.js` | Anime | Needs Consumet API |
            | `zoro.js` | Anime HD | Needs Consumet API |
            | `movies-tmdb.js` | Movies & TV | Needs free TMDB key |
            | `netflix.js` | Netflix | Opens Netflix — subscription required |
            | `prime.js` | Prime Video | Opens Prime Video — subscription required |
            | `appletv.js` | Apple TV+ | Opens Apple TV+ — subscription required |
            | `disney.js` | Disney+ | Opens Disney+ — subscription required |
            | `hulu.js` | Hulu | Opens Hulu — subscription required, US only |
            | `crunchyroll.js` | Crunchyroll | Free with ads |

            ### Requirements
            - Windows 10 or 11 (64-bit)
            - VLC or MPV recommended for playing streams

            ### Notes
            - Subscription plugins (Netflix, Prime etc.) open the official website — they do NOT bypass paywalls
            - Free anime plugins require a [Consumet API](https://github.com/consumet/consumet.ts) instance
          releaseDraft: false
          prerelease: false
